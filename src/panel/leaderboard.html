<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ZulkirBot Leaderboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: transparent;
      width: 401px;
      font-family: 'Libre Baskerville', Georgia, 'Times New Roman', serif;
      font-size: 14px;
      color: #1a0a00;
    }

    .card {
      width: 401px;
      min-height: 622px;
      background-color: transparent;
      background-image: url('parchment.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      position: relative;
      filter: drop-shadow(2px 4px 12px rgba(0, 0, 0, 0.45));
    }

    .inner {
      padding: 52px 24px 24px;
    }

    .stat-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 2rem;
      font-weight: 800;
      color: #5c0a00;
      letter-spacing: 0.3px;
      line-height: 1.15;
      font-variant: small-caps;
      text-shadow: 1px 1px 0 rgba(255, 220, 160, 0.4);
    }

    .stat-type {
      font-style: italic;
      font-size: 12px;
      color: #1a0a00;
      margin-top: 1px;
      margin-bottom: 6px;
    }

    .rule {
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #8b1a00, #c0392b, #8b1a00);
      border: none;
      margin: 5px 0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .rule-thin {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b1a00, transparent);
      border: none;
      margin: 6px 0;
      opacity: 0.5;
    }

    .section-head {
      font-family: 'Libre Baskerville', serif;
      font-variant: small-caps;
      font-size: 18px;
      font-weight: 400;
      color: #5c0a00;
      margin-top: 4px;
      margin-bottom: 2px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      gap: 4px 8px;
      align-items: baseline;
      margin: 6px 0;
      font-size: 13px;
    }

    .rank {
      font-weight: 700;
      color: #5c0a00;
      text-align: right;
    }

    .rank-1 {
      color: #b8860b;
      font-size: 14px;
    }

    .rank-2 {
      color: #808080;
    }

    .rank-3 {
      color: #8b4513;
    }

    .player-name {
      font-weight: 700;
      color: #1a0a00;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-class {
      font-style: italic;
      font-size: 11px;
      color: #3a2010;
      opacity: 0.8;
    }

    .player-xp {
      font-size: 12px;
      color: #5c0a00;
      font-weight: 700;
      white-space: nowrap;
      text-align: right;
    }

    .player-level {
      font-size: 11px;
      color: #3a2010;
      white-space: nowrap;
      text-align: right;
    }

    .stain {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .stain-1 {
      width: 80px;
      height: 60px;
      background: radial-gradient(ellipse, rgba(160, 110, 40, 0.08) 0%, transparent 70%);
      top: 30px;
      right: 20px;
    }

    .stain-2 {
      width: 60px;
      height: 50px;
      background: radial-gradient(ellipse, rgba(100, 70, 20, 0.06) 0%, transparent 70%);
      bottom: 40px;
      left: 10px;
    }

    .last-updated {
      margin-top: 8px;
      font-size: 10px;
      font-style: italic;
      color: #3a2010;
      opacity: 0.6;
      text-align: right;
    }

    .loading {
      font-style: italic;
      font-size: 13px;
      color: #3a2010;
      opacity: 0.7;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="stain stain-1"></div>
    <div class="stain stain-2"></div>

    <div class="inner">
      <div class="stat-name">Leaderboard</div>
      <div class="stat-type">Champions of the Dungeon</div>

      <hr class="rule">

      <div class="section-head">Top Adventurers</div>
      <hr class="rule-thin">

      <div id="leaderboard-list">
        <div class="loading">Consulting the ledger...</div>
      </div>

      <hr class="rule-thin">
      <div class="last-updated" id="last-updated"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kqfrurckgaawlcrqjxqd.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxZnJ1cmNrZ2Fhd2xjcnFqeHFkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDYyODA4NCwiZXhwIjoyMDkwMjA0MDg0fQ.WCYaJ22FCUKOoEQnB_h-N64g0AasuBmb8kwjVIn6vtY'

    const RANK_MEDALS = ['🥇', '🥈', '🥉']

    function formatClass(cls) {
      return cls
        .replace(/_/g, ' ')
        .replace(/\b\w/g, l => l.toUpperCase())
    }

    function formatXP(xp) {
      if (xp >= 1_000_000) return (xp / 1_000_000).toFixed(1) + 'M XP'
      if (xp >= 1_000) return (xp / 1_000).toFixed(1) + 'K XP'
      return xp + ' XP'
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/characters?select=display_name,character_name,class,level,xp&order=xp.desc&limit=10`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            }
          }
        )

        if (!res.ok) throw new Error('Failed to fetch')
        const data = await res.json()
        renderLeaderboard(data)
      } catch (err) {
        console.error('Leaderboard fetch error:', err)
      }
    }

    function renderLeaderboard(players) {
      const list = document.getElementById('leaderboard-list')

      if (!players || players.length === 0) {
        list.innerHTML = '<div class="loading">No adventurers yet.</div>'
        return
      }

      list.innerHTML = players.map((p, i) => {
        const name = p.character_name ?? p.display_name
        const rank = i < 3 ? RANK_MEDALS[i] : `${i + 1}.`
        const rankClass = i === 0 ? 'rank rank-1' : i === 1 ? 'rank rank-2' : i === 2 ? 'rank rank-3' : 'rank'

        return `
        <div class="leaderboard-row">
          <span class="${rankClass}">${rank}</span>
          <div>
            <div class="player-name">${name}</div>
            <div class="player-class">${formatClass(p.class)} · Lv.${p.level}</div>
          </div>
          <div>
            <div class="player-xp">${formatXP(p.xp)}</div>
          </div>
        </div>
      `
      }).join('<hr class="rule-thin">')

      document.getElementById('last-updated').textContent =
        `Updated ${new Date().toLocaleTimeString()}`
    }

    // Initial fetch then every 60 seconds
    fetchLeaderboard()
    setInterval(fetchLeaderboard, 60_000)
  </script>
</body>

</html>
